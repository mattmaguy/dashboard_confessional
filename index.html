<style>
  :root {
    --inkwell: #221f32;
    --shadow: #16121f;
    --bone: #e8e0d2;
    --kermit: #3ddc6b;
    --blurple: #5E4FF5;
    --gradient: linear-gradient(135deg, var(--blurple), var(--kermit));
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="dark"] {
    --bg: var(--shadow);
    --bg2: var(--inkwell);
    --card: rgba(34, 31, 50, 0.85);
    --card-border: rgba(94, 79, 245, 0.15);
    --text: var(--bone);
    --text-muted: rgba(232, 224, 210, 0.5);
    --glow: rgba(94, 79, 245, 0.25);
    --glow-green: rgba(61, 220, 107, 0.2);
  }

  [data-theme="light"] {
    --bg: var(--bone);
    --bg2: #d5cdc0;
    --card: rgba(255, 255, 255, 0.7);
    --card-border: rgba(94, 79, 245, 0.2);
    --text: var(--shadow);
    --text-muted: rgba(22, 18, 31, 0.5);
    --glow: rgba(94, 79, 245, 0.15);
    --glow-green: rgba(61, 220, 107, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* Animated bg mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(94,79,245,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(61,220,107,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(94,79,245,0.06) 0%, transparent 60%);
    animation: meshDrift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes meshDrift {
    0%   { opacity: 1; transform: scale(1) translate(0,0); }
    50%  { opacity: 0.8; transform: scale(1.05) translate(-1%, 1%); }
    100% { opacity: 1; transform: scale(1) translate(1%, -1%); }
  }

  .layout {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: clamp(12px, 2vw, 28px);
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: minmax(80px, auto);
    gap: clamp(8px, 1.2vw, 16px);
    max-width: 1800px;
    margin: 0 auto;
  }

  /* Card base */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: clamp(16px, 2vw, 24px);
    padding: clamp(16px, 2vw, 28px);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 32px rgba(0,0,0,0.18), 0 0 0 0 var(--glow);
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    overflow: hidden;
    position: relative;
    animation: riseIn 0.7s cubic-bezier(0.4,0,0.2,1) both;
  }

  .card:hover {
    transform: translateY(-4px) scale(1.005);
    box-shadow: 0 16px 48px rgba(0,0,0,0.28), 0 0 32px var(--glow);
    border-color: rgba(94, 79, 245, 0.4);
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.18s; }
  .card:nth-child(4) { animation-delay: 0.24s; }
  .card:nth-child(5) { animation-delay: 0.30s; }
  .card:nth-child(6) { animation-delay: 0.36s; }
  .card:nth-child(7) { animation-delay: 0.42s; }

  /* Gradient card variant */
  .card--gradient {
    background: linear-gradient(135deg, rgba(94,79,245,0.25), rgba(61,220,107,0.1));
    border-color: rgba(94, 79, 245, 0.3);
  }

  /* ── GRID PLACEMENT ── */
  /* Clock: spans 5 cols, 2 rows */
  .card-clock    { grid-column: span 5; grid-row: span 2; }
  /* Weather: 4 cols, 2 rows */
  .card-weather  { grid-column: span 4; grid-row: span 2; }
  /* Theme + Moon header: 3 cols, 1 row */
  .card-moon     { grid-column: span 3; grid-row: span 2; }
  /* Schedule: 8 cols, 4 rows */
  .card-schedule { grid-column: span 12; grid-row: span 4; }

  /* ── CLOCK ── */
  .clock-time {
    font-family: var(--font-display);
    font-size: clamp(72px, 9vw, 140px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: baseline;
    gap: 0.05em;
  }

  .clock-seconds {
    font-size: 0.38em;
    opacity: 0.7;
    animation: secPulse 1s ease-in-out infinite;
  }

  @keyframes secPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.08); opacity: 1; }
  }

  .clock-date {
    font-family: var(--font-mono);
    font-size: clamp(11px, 1.1vw, 14px);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 10px;
  }

  .clock-ampm {
    font-family: var(--font-mono);
    font-size: clamp(18px, 2vw, 28px);
    color: var(--kermit);
    align-self: flex-end;
    padding-bottom: 0.1em;
    font-weight: 500;
  }

  .clock-label {
    font-family: var(--font-mono);
    font-size: clamp(9px, 0.8vw, 11px);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* day progress bar under clock */
  .day-progress-wrap {
    margin-top: auto;
    padding-top: 20px;
  }

  .day-progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .day-progress-bar {
    height: 4px;
    background: rgba(232,224,210,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .day-progress-fill {
    height: 100%;
    background: var(--gradient);
    border-radius: 99px;
    transition: width 1s linear;
    box-shadow: 0 0 8px var(--blurple);
  }

  /* ── WEATHER ── */
  .weather-temp {
    font-family: var(--font-display);
    font-size: clamp(56px, 6vw, 88px);
    line-height: 1;
    color: var(--text);
  }

  .weather-temp span { color: var(--blurple); }

  .weather-condition {
    font-size: clamp(12px, 1.2vw, 15px);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 6px 0 16px;
    font-family: var(--font-mono);
  }

  .weather-icon-wrap {
    position: absolute;
    top: 20px;
    right: 20px;
    width: clamp(48px, 5vw, 72px);
    height: clamp(48px, 5vw, 72px);
  }

  /* Animated sun */
  .sun-circle {
    width: 50%; height: 50%;
    background: #ffc843;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 16px #ffc84366;
  }

  .sun-rays {
    position: absolute;
    inset: 0;
    animation: spinRays 8s linear infinite;
  }

  .sun-ray {
    position: absolute;
    width: 3px;
    background: #ffc843;
    border-radius: 2px;
    top: 50%; left: 50%;
    transform-origin: 0 0;
  }

  @keyframes spinRays { to { transform: rotate(360deg); } }

  /* Cloud */
  .cloud-body {
    position: absolute;
    background: rgba(200,210,220,0.85);
    border-radius: 40px;
    animation: cloudDrift 4s ease-in-out infinite alternate;
  }

  @keyframes cloudDrift {
    from { transform: translateX(-3px); }
    to   { transform: translateX(3px); }
  }

  /* Rain */
  .rain-drop {
    position: absolute;
    width: 2px;
    background: var(--blurple);
    border-radius: 2px;
    opacity: 0.7;
    animation: rainFall 0.9s linear infinite;
  }

  @keyframes rainFall {
    from { transform: translateY(-20px); opacity: 0; }
    20%  { opacity: 0.7; }
    to   { transform: translateY(60px); opacity: 0; }
  }

  /* Forecast row */
  .forecast-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .forecast-item {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 8px 6px;
    text-align: center;
  }

  .forecast-day {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .forecast-temp {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text);
  }

  .forecast-temp .hi { color: var(--kermit); font-size: 13px; }
  .forecast-temp .lo { color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); }

  .weather-detail-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .weather-detail {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .weather-detail-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
  }

  .weather-detail-value {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  /* ── MOON ── */
  .moon-svg-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 8px 0 12px;
  }

  .moon-phase-name {
    font-family: var(--font-display);
    font-size: clamp(18px, 2.5vw, 28px);
    letter-spacing: 0.05em;
    text-align: center;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .moon-illumination {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── SCHEDULE ── */
  .schedule-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .schedule-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 2.5vw, 36px);
    letter-spacing: 0.06em;
  }

  .schedule-subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: calc(100% - 80px);
    overflow-y: auto;
    scrollbar-width: none;
  }

  .schedule-list::-webkit-scrollbar { display: none; }

  .schedule-item {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .schedule-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gradient);
    border-radius: 3px 0 0 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .schedule-item.is-current {
    background: rgba(94, 79, 245, 0.12);
    border-color: rgba(94, 79, 245, 0.3);
  }

  .schedule-item.is-current::before { opacity: 1; }

  .schedule-item.is-past {
    opacity: 0.4;
  }

  .schedule-item.is-next {
    background: rgba(61, 220, 107, 0.06);
    border-color: rgba(61, 220, 107, 0.2);
  }

  .schedule-time {
    font-family: var(--font-mono);
    font-size: clamp(10px, 1vw, 12px);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .schedule-name {
    font-size: clamp(12px, 1.2vw, 14px);
    font-weight: 500;
    color: var(--text);
  }

  .schedule-item.is-current .schedule-name { color: var(--blurple); }
  .schedule-item.is-next .schedule-name { color: var(--kermit); }

  .schedule-progress-wrap {
    width: 60px;
  }

  .schedule-progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .schedule-progress-fill {
    height: 100%;
    background: var(--gradient);
    border-radius: 99px;
    transition: width 1s linear;
  }

  .schedule-pct {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 2px;
    letter-spacing: 0.08em;
  }

  /* ── STATS (moon detail + extra) ── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    height: 100%;
  }

  .stat-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: clamp(24px, 2.8vw, 40px);
    color: var(--text);
    line-height: 1;
  }

  .stat-value.accent { color: var(--kermit); }
  .stat-value.accent2 { color: var(--blurple); }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: clamp(12px, 2vw, 24px);
    right: clamp(12px, 2vw, 24px);
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 99px;
    padding: 8px 16px;
    cursor: pointer;
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    transition: all var(--transition);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .theme-toggle:hover {
    border-color: rgba(94, 79, 245, 0.5);
    box-shadow: 0 4px 20px var(--glow);
  }

  .toggle-dot {
    width: 20px; height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    position: relative;
    transition: background var(--transition);
  }

  .toggle-dot::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blurple);
    transition: transform var(--transition), background var(--transition);
  }

  [data-theme="light"] .toggle-dot::after {
    transform: translateX(8px);
    background: var(--kermit);
  }

  /* ── CARD LABEL ── */
  .card-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gradient);
  }

  /* ── CARD INNER LAYOUT ── */
  .card-clock { display: flex; flex-direction: column; }
  .card-weather { display: flex; flex-direction: column; }
  .card-moon { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .card-schedule { display: flex; flex-direction: column; }

  /* ── RESPONSIVE ── */
  @media (min-width: 1920px) {
    .layout { max-width: 2200px; }
    .clock-time { font-size: 160px; }
  }

  @media (max-width: 1200px) {
    .card-clock    { grid-column: span 6; }
    .card-weather  { grid-column: span 6; }
    .card-moon     { grid-column: span 4; }
    .card-schedule { grid-column: span 12; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: repeat(6, 1fr); }
    .card-clock    { grid-column: span 6; grid-row: span 2; }
    .card-weather  { grid-column: span 3; grid-row: span 2; }

  }

  @media (max-width: 600px) {
    .layout { grid-template-columns: 1fr; }
    .card-clock, .card-weather, .card-moon, .card-schedule {
      grid-column: 1; grid-row: auto;
    }
  }

  /* Current block ticker */
  .current-block-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, rgba(94,79,245,0.2), rgba(61,220,107,0.1));

  /* Gradient border on clock card */
  .card-clock::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(94,79,245,0.08), rgba(61,220,107,0.04));
    pointer-events: none;
  }

  /* ── DAY FILTER BAR ── */
  .day-filter-wrap {
    position: relative;
    z-index: 2;
    padding: clamp(12px, 2vw, 28px) clamp(12px, 2vw, 28px) 0;
    max-width: 1800px;
    margin: 0 auto;
  }

  .day-filter {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .day-filter::-webkit-scrollbar { display: none; }

  .day-pill {
    flex-shrink: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: 99px;
    border: 1px solid var(--card-border);
    background: var(--card);
    backdrop-filter: blur(16px);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }

  .day-pill:hover {
    border-color: rgba(94, 79, 245, 0.4);
    box-shadow: 0 4px 16px var(--glow);
    transform: translateY(-2px);
  }

  .day-pill-name {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    transition: color 0.25s;
  }

  .day-pill-date {
    font-family: var(--font-display);
    font-size: 20px;
    line-height: 1;
    color: var(--text);
    transition: color 0.25s;
  }

  .day-pill-divider {
    width: 1px;
    height: 14px;
    background: var(--card-border);
    flex-shrink: 0;
  }

  .day-pill-tag {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.25s;
  }

  .day-pill.is-today::after {
    content: '';
    position: absolute;
    right: 10px; top: 50%; transform: translateY(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--kermit);

  .day-pill.is-active {
    background: linear-gradient(135deg, rgba(94,79,245,0.3), rgba(61,220,107,0.15));
    border-color: rgba(94, 79, 245, 0.5);
    box-shadow: 0 4px 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .day-pill.is-active .day-pill-name { color: var(--blurple); }
  .day-pill.is-active .day-pill-date { color: var(--text); }

  .day-pill.is-recovery {
    border-color: rgba(61, 220, 107, 0.25);
  }

  .day-pill.is-recovery .day-pill-tag { color: var(--kermit); }

  .day-pill.is-recovery.is-active {
    background: linear-gradient(135deg, rgba(61,220,107,0.2), rgba(94,79,245,0.1));
    border-color: rgba(61, 220, 107, 0.5);
  }

  .day-pill.is-past-day {
    opacity: 0.5;
  }

  /* ── WEEK HEADER ── */
  .week-header {
    display: flex;
    align-items: center;
    gap: clamp(16px, 2vw, 28px);
  }

  .week-headline {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.5vw, 52px);
    letter-spacing: 0.04em;
    color: var(--text);
    white-space: nowrap;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Viewing non-today mode */
  .viewing-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, rgba(61,220,107,0.15), rgba(94,79,245,0.1));
    border: 1px solid rgba(61, 220, 107, 0.3);
    border-radius: 99px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--kermit);
    letter-spacing: 0.08em;
  }
</style>
</head>

<script>
// ── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
}

// ── DAY SELECTION STATE ─────────────────────────────────────────────────────
const TODAY = new Date();
TODAY.setHours(0, 0, 0, 0);
let selectedDate = new Date(TODAY); // starts as today

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

function isViewingToday() {
  return isSameDay(selectedDate, TODAY);
}

// ── CLOCK ──────────────────────────────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  document.getElementById('clock-h').textContent = String(h).padStart(2, '0');
  document.getElementById('clock-m').textContent = String(m).padStart(2, '0');
  document.getElementById('clock-s').textContent = String(s).padStart(2, '0');
  document.getElementById('clock-ampm').textContent = ampm;

  if (isViewingToday()) {
    document.getElementById('clock-date').textContent =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    const totalMins = 24 * 60;
    const elapsed = now.getHours() * 60 + now.getMinutes();
    const pct = Math.round((elapsed / totalMins) * 100);
    document.getElementById('day-pct').textContent = pct + '%';
    document.getElementById('day-fill').style.width = pct + '%';
    updateSchedule(now);
    updateStats(now);
  } else {
    document.getElementById('clock-date').textContent =
      `${DAYS[selectedDate.getDay()]}, ${MONTHS[selectedDate.getMonth()]} ${selectedDate.getDate()}, ${selectedDate.getFullYear()}`;
  }
}

// clock started after DOM is built — see bottom of script

// ── SCHEDULES ───────────────────────────────────────────────────────────────
const SCHEDULE_STANDARD = [
  { time: '06:45', label: 'Wake + Hydrate',             icon: '💧' },
  { time: '06:50', label: 'Morning Outdoor Light Walk', icon: '🌅' },
  { time: '07:10', label: 'Breakfast + Coffee',         icon: '☕' },
  { time: '07:30', label: 'Daily Planning',             icon: '📋' },
  { time: '08:00', label: 'Deep Focus Block',           icon: '🧠' },
  { time: '11:30', label: 'Movement Break',             icon: '🏃' },
  { time: '12:00', label: 'Lunch Reset',                icon: '🥗' },
  { time: '12:30', label: 'Execution / Meetings',       icon: '💼' },
  { time: '14:30', label: 'Admin / Creative Work',      icon: '✏️' },
  { time: '16:00', label: 'Afternoon Walk Reset',       icon: '🚶' },
  { time: '16:30', label: 'Wrap Workday',               icon: '✅' },
  { time: '18:00', label: 'Dinner / Family Time',       icon: '🍽️' },
  { time: '19:00', label: 'Low Stimulation Evening',    icon: '📖' },
  { time: '21:10', label: 'Nightly Journal',            icon: '📔' },
  { time: '21:30', label: 'Wind Down Routine',          icon: '🌙' },
  { time: '22:00', label: 'Parasympathetic Breathing',  icon: '🫁' },
  { time: '22:45', label: 'Bedtime',                    icon: '😴' },
];

const SCHEDULE_RECOVERY = [
  { time: '08:00', label: 'Sleep In / Slow Morning',   icon: '😴' },
  { time: '09:30', label: 'Easy Breakfast',             icon: '🥞' },
  { time: '10:00', label: 'Light Outdoor Activity',     icon: '🌿' },
  { time: '12:00', label: 'Lunch — No Rush',            icon: '🥗' },
  { time: '13:00', label: 'Family Time',                icon: '👨‍👩‍👧' },
  { time: '15:00', label: 'Rest / Nap Optional',        icon: '🛋️' },
  { time: '17:00', label: 'Outdoor Walk',               icon: '🚶' },
  { time: '18:30', label: 'Dinner',                     icon: '🍽️' },
  { time: '19:30', label: 'Low Stimulation Evening',    icon: '📖' },
  { time: '21:30', label: 'Wind Down',                  icon: '🌙' },
  { time: '22:30', label: 'Bedtime',                    icon: '😴' },
];

function isFriday(date) { return date.getDay() === 5; }
function isWeekend(date) { return date.getDay() === 0 || date.getDay() === 6; }

function getScheduleForDate(date) {
  if (isFriday(date)) return SCHEDULE_RECOVERY;
  return SCHEDULE_STANDARD;
}

// ── DAY FILTER ──────────────────────────────────────────────────────────────
function buildDayFilter() {
  const filter = document.getElementById('day-filter');
  filter.innerHTML = '';

  // Show Mon Mar 16 → Sun Mar 22 (the week ahead) plus today if it's before Mon
  const weekStart = new Date(TODAY);
  // Find this week's Monday (week of Mar 16)
  // We'll just show 7 days starting from today
  for (let i = 0; i < 7; i++) {
    const d = new Date(TODAY);
    d.setDate(TODAY.getDate() + i);

    const isToday = i === 0;
    const isPast = d < TODAY;
    const isFri = isFriday(d);
    const isActive = isSameDay(d, selectedDate);

    const pill = document.createElement('button');
    pill.className = [
      'day-pill',
      isToday ? 'is-today' : '',
      isPast ? 'is-past-day' : '',
      isFri ? 'is-recovery' : '',
      isActive ? 'is-active' : '',
    ].filter(Boolean).join(' ');

    const tag = isFri ? 'Recovery' : isWeekend(d) ? 'Rest' : 'Work';

    pill.innerHTML = `
      <span class="day-pill-name">${DAYS_SHORT[d.getDay()]}</span>
      <span class="day-pill-date">${d.getDate()}</span>
      <div class="day-pill-divider"></div>
      <span class="day-pill-tag">${isToday ? 'Today' : tag}</span>
    `;

    pill.addEventListener('click', () => selectDay(d));
    filter.appendChild(pill);
  }
}

function selectDay(date) {
  selectedDate = new Date(date);
  selectedDate.setHours(0, 0, 0, 0);

  // Update pill active states
  const pills = document.querySelectorAll('.day-pill');
  pills.forEach((pill, i) => {
    const d = new Date(TODAY);
    d.setDate(TODAY.getDate() + i);
    pill.classList.toggle('is-active', isSameDay(d, selectedDate));
  });

  // Update moon for selected day
  renderMoon(selectedDate);

  // Rebuild schedule for new day
  buildScheduleList();

  // Update schedule title/badge
  updateScheduleHeader();

  // Update clock date display
  if (!isViewingToday()) {
    document.getElementById('clock-date').textContent =
      `${DAYS[selectedDate.getDay()]}, ${MONTHS[selectedDate.getMonth()]} ${selectedDate.getDate()}, ${selectedDate.getFullYear()}`;
    // For future/past days, show static day progress
    const isPast = selectedDate < TODAY;
    document.getElementById('day-pct').textContent = isPast ? '100%' : '0%';
    document.getElementById('day-fill').style.width = isPast ? '100%' : '0%';
    updateStatsFuture();
  }

  updateSchedule(isViewingToday() ? new Date() : null);
}

function updateScheduleHeader() {
  const badge = document.getElementById('schedule-badge');
  const label = document.getElementById('current-block-label');
  const title = document.querySelector('.schedule-title');

  if (isViewingToday()) {
    badge.className = 'current-block-badge';
    badge.innerHTML = `<div class="live-dot"></div><span id="current-block-label">Live</span>`;
    title.textContent = "TODAY'S BLOCKS";
  } else {
    const isFri = isFriday(selectedDate);
    badge.className = 'viewing-badge';
    badge.innerHTML = `<span id="current-block-label">${isFri ? '🌿 Recovery' : 'Preview'}</span>`;
    title.textContent = `${DAYS[selectedDate.getDay()].toUpperCase()}'S BLOCKS`;
  }
}

// ── SCHEDULE ────────────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmt12(t) {
  let [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function buildScheduleList() {
  const sched = getScheduleForDate(selectedDate);
  const list = document.getElementById('schedule-list');
  list.innerHTML = '';
  sched.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'schedule-item';
    el.id = `sched-${i}`;
    el.innerHTML = `
      <span class="schedule-time">${fmt12(item.time)}</span>
      <span class="schedule-name">${item.icon} ${item.label}</span>
      <div class="schedule-progress-wrap" id="spw-${i}" style="display:none">
        <div class="schedule-progress-bar"><div class="schedule-progress-fill" id="spf-${i}" style="width:0%"></div></div>
        <div class="schedule-pct" id="spp-${i}">0%</div>
      </div>
    `;
    list.appendChild(el);
  });
}

// buildScheduleList called at init — see bottom of script

function updateSchedule(now) {
  const sched = getScheduleForDate(selectedDate);
  const isToday = isViewingToday();

  // If not today, show all as upcoming (no live state)
  if (!isToday || !now) {
    const isPastDay = selectedDate < TODAY;
    sched.forEach((_, i) => {
      const el = document.getElementById(`sched-${i}`);
      if (el) {
        el.className = 'schedule-item' + (isPastDay ? ' is-past' : '');
        const spw = document.getElementById(`spw-${i}`);
        if (spw) spw.style.display = 'none';
      }
    });
    return;
  }

  const nowMins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  let currentIdx = -1;

  for (let i = 0; i < sched.length; i++) {
    const start = timeToMins(sched[i].time);
    const end = i < sched.length - 1 ? timeToMins(sched[i+1].time) : 24 * 60;
    const el = document.getElementById(`sched-${i}`);
    if (!el) continue;
    el.className = 'schedule-item';
    document.getElementById(`spw-${i}`).style.display = 'none';

    if (nowMins >= start && nowMins < end) {
      el.classList.add('is-current');
      currentIdx = i;
      const pct = Math.min(100, Math.round(((nowMins - start) / (end - start)) * 100));
      document.getElementById(`spw-${i}`).style.display = 'block';
      document.getElementById(`spf-${i}`).style.width = pct + '%';
      document.getElementById(`spp-${i}`).textContent = pct + '%';
      const lbl = document.getElementById('current-block-label');
      if (lbl) lbl.textContent = sched[i].label;
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else if (nowMins < start) {
      if (currentIdx === -1 && i === 0) el.classList.add('is-next');
      else if (i === currentIdx + 1) el.classList.add('is-next');
    } else {
      el.classList.add('is-past');
    }
  }
}

function updateStats(now) {
  const sched = getScheduleForDate(selectedDate);
  const nowMins = now.getHours() * 60 + now.getMinutes();
  let done = 0, remaining = 0;

  sched.forEach((item, i) => {
    const start = timeToMins(item.time);
    const end = i < sched.length - 1 ? timeToMins(sched[i+1].time) : 24 * 60;
    if (nowMins >= end) done++;
    else if (nowMins < start) remaining++;
  });

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-remaining').textContent = remaining;

  const wakeTime = timeToMins(sched[0].time);
  const bedTime  = timeToMins(sched[sched.length - 1].time);
  const wakeNext = wakeTime + 24 * 60;

  const wakeIn = nowMins < wakeTime ? wakeTime - nowMins : wakeNext - nowMins;
  const wh = Math.floor(wakeIn / 60), wm = wakeIn % 60;
  document.getElementById('stat-wake').textContent = `${wh}h ${wm}m`;

  const bedIn = nowMins < bedTime ? bedTime - nowMins : (bedTime + 24 * 60) - nowMins;
  const bh = Math.floor(bedIn / 60), bm = bedIn % 60;
  document.getElementById('stat-bed').textContent = `${bh}h ${bm}m`;
}

function updateStatsFuture() {
  const sched = getScheduleForDate(selectedDate);
  const isPast = selectedDate < TODAY;
  document.getElementById('stat-done').textContent = isPast ? sched.length : 0;
  document.getElementById('stat-remaining').textContent = isPast ? 0 : sched.length;
  const wakeTime = sched[0].time;
  const bedTime  = sched[sched.length - 1].time;
  document.getElementById('stat-wake').textContent = fmt12(wakeTime);
  document.getElementById('stat-bed').textContent  = fmt12(bedTime);
}

// ── MOON PHASE ─────────────────────────────────────────────────────────────
function getMoonPhase(date) {
  // Known new moon: Jan 6, 2000
  const knownNew = new Date('2000-01-06T18:14:00Z');
  const synodicMonth = 29.530588853;
  const diffDays = (date - knownNew) / (1000 * 60 * 60 * 24);
  let phase = ((diffDays % synodicMonth) + synodicMonth) % synodicMonth;
  const illumination = Math.round((1 - Math.cos((phase / synodicMonth) * 2 * Math.PI)) / 2 * 100);

  let name;
  if (phase < 1.85) name = 'New Moon';
  else if (phase < 7.38) name = 'Waxing Crescent';
  else if (phase < 9.22) name = 'First Quarter';
  else if (phase < 14.77) name = 'Waxing Gibbous';
  else if (phase < 16.61) name = 'Full Moon';
  else if (phase < 22.15) name = 'Waning Gibbous';
  else if (phase < 23.99) name = 'Last Quarter';
  else if (phase < 29.53) name = 'Waning Crescent';
  else name = 'New Moon';

  return { phase, illumination, name };
}

function renderMoon(date) {
  date = date || new Date();
  const { phase, illumination, name } = getMoonPhase(date);
  const synodicMonth = 29.530588853;
  const normalizedPhase = phase / synodicMonth; // 0–1

  document.getElementById('moon-phase-name').textContent = name;
  document.getElementById('moon-illumination').textContent = `${illumination}% Illuminated`;

  const size = 100;
  const r = size / 2;
  const cx = r, cy = r;

  // Build moon SVG
  // The lit crescent is determined by phase:
  // 0=new, 0.25=first quarter, 0.5=full, 0.75=last quarter
  let litPath = '';
  const waxing = normalizedPhase < 0.5;
  const angle = normalizedPhase <= 0.5
    ? (1 - normalizedPhase * 2) * r  // waxing: 0→full
    : ((normalizedPhase - 0.5) * 2) * r; // waning

  // SVG moon: dark circle with lit arc
  // We draw: full circle (moon body), then overlay shadow ellipse
  let shadowEllipseRx;
  let shadowSide;

  if (normalizedPhase === 0 || normalizedPhase > 0.98) {
    // New moon: fully dark
    shadowEllipseRx = r;
    shadowSide = 'full';
  } else if (normalizedPhase < 0.5) {
    // Waxing: shadow on left
    shadowEllipseRx = Math.abs(1 - normalizedPhase * 4) * r;
    shadowSide = normalizedPhase < 0.25 ? 'leftEllipse' : 'rightEllipse';
  } else {
    // Waning: shadow on right
    shadowEllipseRx = Math.abs((normalizedPhase - 0.5) * 4 - 1) * r;
    shadowSide = normalizedPhase < 0.75 ? 'leftEllipse' : 'rightEllipse';
  }

  const svgSize = 100;
  const svgR = 40;
  const svgCx = 50, svgCy = 50;

  // Create the clipping path for the lit portion
  const p = normalizedPhase;
  // Illumination fraction for the terminator ellipse x-radius
  let termRx;
  let termLeft; // which side is lit

  if (p < 0.5) {
    // Waxing: right side lit
    termLeft = false;
    termRx = Math.abs(Math.cos(p * 2 * Math.PI)) * svgR;
  } else {
    // Waning: left side lit
    termLeft = true;
    termRx = Math.abs(Math.cos(p * 2 * Math.PI)) * svgR;
  }

  const moonSVG = `
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="90" height="90">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe6" stop-opacity="1"/>
      <stop offset="70%" stop-color="#e8d98a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#b8a04a" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="moonDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2540" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16121f" stop-opacity="0.98"/>
    </radialGradient>
    <filter id="moonGlowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rightHalf"><rect x="${svgCx}" y="${svgCy - svgR - 5}" width="${svgR + 5}" height="${(svgR + 5)*2}"/></clipPath>
    <clipPath id="leftHalf"><rect x="${svgCx - svgR - 5}" y="${svgCy - svgR - 5}" width="${svgR + 5}" height="${(svgR + 5)*2}"/></clipPath>
  </defs>

  <!-- Outer glow -->
  <circle cx="${svgCx}" cy="${svgCy}" r="${svgR + 6}" fill="${illumination > 5 ? '#e8d98a' : '#5E4FF5'}" opacity="0.06"/>
  <circle cx="${svgCx}" cy="${svgCy}" r="${svgR + 3}" fill="${illumination > 5 ? '#e8d98a' : '#5E4FF5'}" opacity="0.1"/>

  <!-- Moon body (full circle, lit color) -->
  <circle cx="${svgCx}" cy="${svgCy}" r="${svgR}" fill="url(#moonGlow)" filter="url(#moonGlowFilter)"/>

  ${p > 0.02 && p < 0.98 ? `
  <!-- Shadow overlay -->
  <g>
    <!-- Full dark half -->
    <circle cx="${svgCx}" cy="${svgCy}" r="${svgR}" fill="url(#moonDark)"
      clip-path="url(#${p < 0.5 ? 'leftHalf' : 'rightHalf'})"/>
    <!-- Terminator ellipse (dark side of crescent) -->
    <ellipse cx="${svgCx}" cy="${svgCy}" rx="${termRx}" ry="${svgR}" fill="url(#moonDark)"
      clip-path="url(#${p < 0.5 ? 'rightHalf' : 'leftHalf'})"/>
  </g>
  ` : p <= 0.02 ? `<circle cx="${svgCx}" cy="${svgCy}" r="${svgR}" fill="url(#moonDark)"/>` : ''}

  <!-- Craters (subtle) -->
  <circle cx="40" cy="42" r="4" fill="rgba(0,0,0,0.06)"/>
  <circle cx="58" cy="36" r="3" fill="rgba(0,0,0,0.05)"/>
  <circle cx="52" cy="58" r="2.5" fill="rgba(0,0,0,0.04)"/>
</svg>`;

  document.getElementById('moon-svg-wrap').innerHTML = moonSVG;
}

renderMoon();
buildDayFilter();

// ── WEATHER ────────────────────────────────────────────────────────────────
const WMO_CODES = {
  0: 'Clear Sky', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
  45: 'Foggy', 48: 'Icy Fog',
  51: 'Light Drizzle', 53: 'Drizzle', 55: 'Heavy Drizzle',
  61: 'Light Rain', 63: 'Rain', 65: 'Heavy Rain',
  71: 'Light Snow', 73: 'Snow', 75: 'Heavy Snow',
  80: 'Showers', 81: 'Showers', 82: 'Heavy Showers',
  95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm',
};

function getWeatherIcon(code, isDay) {
  if (code === 0 || code === 1) return buildSunIcon();
  if (code === 2 || code === 3) return buildCloudIcon();
  if (code >= 51 && code <= 82) return buildRainIcon();
  if (code >= 71 && code <= 75) return buildCloudIcon(); // snow: use cloud
  return buildSunIcon();
}

function buildSunIcon() {
  return `
<div style="position:relative;width:100%;height:100%">
  <div class="sun-circle"></div>
  <svg class="sun-rays" viewBox="0 0 60 60" style="position:absolute;inset:0;width:100%;height:100%">
    ${Array.from({length:8},(_,i)=>{
      const a = i * 45;
      const rad = a * Math.PI / 180;
      const x1 = 30 + Math.cos(rad) * 18;
      const y1 = 30 + Math.sin(rad) * 18;
      const x2 = 30 + Math.cos(rad) * 26;
      const y2 = 30 + Math.sin(rad) * 26;
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffc843" stroke-width="2.5" stroke-linecap="round"/>`;
    }).join('')}
  </svg>
</div>`;
}

function buildCloudIcon() {
  return `
<div style="position:relative;width:100%;height:100%">
  <div class="cloud-body" style="width:70%;height:36%;bottom:22%;left:8%"></div>
  <div class="cloud-body" style="width:50%;height:30%;bottom:38%;left:20%;animation-delay:0.5s"></div>
  <div class="cloud-body" style="width:40%;height:28%;bottom:36%;left:40%;background:rgba(200,210,220,0.6);animation-delay:1s"></div>
</div>`;
}

function buildRainIcon() {
  const drops = Array.from({length: 5}, (_, i) => {
    const l = 15 + i * 14;
    const delay = (i * 0.18).toFixed(2);
    const h = 6 + Math.random() * 6;
    return `<div class="rain-drop" style="left:${l}%;height:${h}px;animation-delay:${delay}s"></div>`;
  }).join('');
  return `
<div style="position:relative;width:100%;height:100%">
  <div class="cloud-body" style="width:70%;height:35%;bottom:45%;left:8%"></div>
  ${drops}
</div>`;
}

function getUserLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ lat: 37.7749, lon: -122.4194, city: 'San Francisco' });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude.toFixed(4);
        const lon = pos.coords.longitude.toFixed(4);
        // Reverse geocode with Open-Meteo's free geocoding helper via nominatim
        try {
          const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, {
            headers: { 'User-Agent': 'DailyCommandDashboard/1.0' }
          });
          const gd = await geo.json();
          const city = gd.address.city || gd.address.town || gd.address.village || gd.address.county || 'Your Location';
          resolve({ lat, lon, city });
        } catch {
          resolve({ lat, lon, city: 'Your Location' });
        }
      },
      () => resolve({ lat: 37.7749, lon: -122.4194, city: 'San Francisco' }),
      { timeout: 8000 }
    );
  });
}

async function fetchWeather() {
  try {
    // Get user's location
    const { lat, lon, city } = await getUserLocation();
    document.getElementById('weather-location').textContent = city;

    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation_probability,weather_code,wind_speed_10m,is_day&daily=temperature_2m_max,temperature_2m_min,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=${encodeURIComponent(tz)}&forecast_days=3`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.reason || 'API error');

    const cw = data.current;
    const code = cw.weather_code;
    const temp = Math.round(cw.temperature_2m);
    const wind = Math.round(cw.wind_speed_10m);
    const humidity = cw.relative_humidity_2m || '--';
    const rain = cw.precipitation_probability || 0;

    document.getElementById('weather-temp').innerHTML = `<span>${temp}</span>°`;
    document.getElementById('weather-condition').textContent = WMO_CODES[code] || 'Unknown';
    document.getElementById('weather-wind').textContent = `${wind} mph`;
    document.getElementById('weather-humidity').textContent = `${humidity}%`;
    document.getElementById('weather-rain').textContent = `${rain}%`;
    document.getElementById('weather-icon').innerHTML = getWeatherIcon(code, cw.is_day);

    // forecast
    const days = data.daily;
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const forecastHTML = [0,1,2].map(i => {
      const d = new Date(days.time[i] + 'T12:00:00');
      const dn = dayNames[d.getDay()];
      const hi = Math.round(days.temperature_2m_max[i]);
      const lo = Math.round(days.temperature_2m_min[i]);
      return `<div class="forecast-item">
        <div class="forecast-day">${dn}</div>
        <div class="forecast-temp">${hi}°</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center">${lo}°</div>
      </div>`;
    }).join('');
    document.getElementById('forecast-row').innerHTML = forecastHTML;
  } catch(e) {
    console.error('Weather fetch failed:', e);
    document.getElementById('weather-condition').textContent = 'Unavailable';
    document.getElementById('weather-location').textContent = 'Check console';
    document.getElementById('weather-icon').innerHTML = buildSunIcon();
  }
}

// ── INIT (order matters) ────────────────────────────────────────────────────
buildScheduleList();   // create DOM items first
buildDayFilter();      // then pills
renderMoon();          // moon SVG
updateClock();         // first tick with DOM ready
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);
</script>
