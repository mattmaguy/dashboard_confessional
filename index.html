<style>
  :root {
    --inkwell: #221f32;
    --shadow: #16121f;
    --bone: #e8e0d2;
    --kermit: #3ddc6b;
    --blurple: #5E4FF5;
    --gradient: linear-gradient(135deg, var(--blurple), var(--kermit));
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="dark"] {
    --bg: var(--shadow);
    --bg2: var(--inkwell);
    --card: rgba(34, 31, 50, 0.85);
    --card-border: rgba(94, 79, 245, 0.15);
    --text: var(--bone);
    --text-muted: rgba(232, 224, 210, 0.5);
    --glow: rgba(94, 79, 245, 0.25);
    --glow-green: rgba(61, 220, 107, 0.2);
  }

  [data-theme="light"] {
    --bg: var(--bone);
    --bg2: #d5cdc0;
    --card: rgba(255, 255, 255, 0.7);
    --card-border: rgba(94, 79, 245, 0.2);
    --text: var(--shadow);
    --text-muted: rgba(22, 18, 31, 0.5);
    --glow: rgba(94, 79, 245, 0.15);
    --glow-green: rgba(61, 220, 107, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(94,79,245,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(61,220,107,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(94,79,245,0.06) 0%, transparent 60%);
    animation: meshDrift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes meshDrift {
    0%   { opacity: 1; transform: scale(1) translate(0,0); }
    50%  { opacity: 0.8; transform: scale(1.05) translate(-1%, 1%); }
    100% { opacity: 1; transform: scale(1) translate(1%, -1%); }
  }

  .layout {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: clamp(12px, 2vw, 28px);
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: minmax(80px, auto);
    gap: clamp(8px, 1.2vw, 16px);
    max-width: 1800px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: clamp(16px, 2vw, 24px);
    padding: clamp(16px, 2vw, 28px);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 4px 32px rgba(0,0,0,0.18), 0 0 0 0 var(--glow);
    transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    overflow: hidden;
    position: relative;
    animation: riseIn 0.7s cubic-bezier(0.4,0,0.2,1) both;
  }

  .card:hover {
    transform: translateY(-4px) scale(1.005);
    box-shadow: 0 16px 48px rgba(0,0,0,0.28), 0 0 32px var(--glow);
    border-color: rgba(94, 79, 245, 0.4);
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.18s; }
  .card:nth-child(4) { animation-delay: 0.24s; }

  .card--gradient {
    background: linear-gradient(135deg, rgba(94,79,245,0.25), rgba(61,220,107,0.1));
    border-color: rgba(94, 79, 245, 0.3);
  }

  .card-clock    { grid-column: span 5; grid-row: span 2; }
  .card-weather  { grid-column: span 4; grid-row: span 2; }
  .card-moon     { grid-column: span 3; grid-row: span 2; }
  .card-schedule { grid-column: span 12; grid-row: span 4; }

  /* ── CLOCK ── */
  .clock-time {
    font-family: var(--font-display);
    font-size: clamp(72px, 9vw, 140px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: baseline;
    gap: 0.05em;
  }

  .clock-seconds {
    font-size: 0.38em;
    opacity: 0.7;
    animation: secPulse 1s ease-in-out infinite;
  }

  @keyframes secPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.08); opacity: 1; }
  }

  .clock-date {
    font-family: var(--font-mono);
    font-size: clamp(11px, 1.1vw, 14px);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 10px;
  }

  .clock-ampm {
    font-family: var(--font-mono);
    font-size: clamp(18px, 2vw, 28px);
    color: var(--kermit);
    align-self: flex-end;
    padding-bottom: 0.1em;
    font-weight: 500;
  }

  .day-progress-wrap {
    margin-top: auto;
    padding-top: 20px;
  }

  .day-progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .day-progress-bar {
    height: 4px;
    background: rgba(232,224,210,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .day-progress-fill {
    height: 100%;
    background: var(--gradient);
    border-radius: 99px;
    transition: width 1s linear;
    box-shadow: 0 0 8px var(--blurple);
  }

  /* ── WEATHER ── */
  .weather-temp {
    font-family: var(--font-display);
    font-size: clamp(56px, 6vw, 88px);
    line-height: 1;
    color: var(--text);
  }

  .weather-temp span { color: var(--blurple); }

  .weather-condition {
    font-size: clamp(12px, 1.2vw, 15px);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 6px 0 16px;
    font-family: var(--font-mono);
  }

  .weather-icon-wrap {
    position: absolute;
    top: 20px;
    right: 20px;
    width: clamp(48px, 5vw, 72px);
    height: clamp(48px, 5vw, 72px);
  }

  .sun-circle {
    width: 50%; height: 50%;
    background: #ffc843;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 16px #ffc84366;
  }

  .sun-rays {
    position: absolute;
    inset: 0;
    animation: spinRays 8s linear infinite;
  }

  @keyframes spinRays { to { transform: rotate(360deg); } }

  .cloud-body {
    position: absolute;
    background: rgba(200,210,220,0.85);
    border-radius: 40px;
    animation: cloudDrift 4s ease-in-out infinite alternate;
  }

  @keyframes cloudDrift {
    from { transform: translateX(-3px); }
    to   { transform: translateX(3px); }
  }

  .rain-drop {
    position: absolute;
    width: 2px;
    background: var(--blurple);
    border-radius: 2px;
    opacity: 0.7;
    animation: rainFall 0.9s linear infinite;
  }

  @keyframes rainFall {
    from { transform: translateY(-20px); opacity: 0; }
    20%  { opacity: 0.7; }
    to   { transform: translateY(60px); opacity: 0; }
  }

  .forecast-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .forecast-item {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 8px 6px;
    text-align: center;
  }

  .forecast-day {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .forecast-temp {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--text);
  }

  .weather-detail-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
  }

  .weather-detail {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .weather-detail-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
  }

  .weather-detail-value {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  /* ── MOON ── */
  .moon-svg-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 8px 0 12px;
  }

  .moon-phase-name {
    font-family: var(--font-display);
    font-size: clamp(18px, 2.5vw, 28px);
    letter-spacing: 0.05em;
    text-align: center;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .moon-illumination {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── SCHEDULE ── */
  .schedule-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .schedule-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 2.5vw, 36px);
    letter-spacing: 0.06em;
  }

  .schedule-theme {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--kermit);
    margin-top: 4px;
    letter-spacing: 0.06em;
    opacity: 0.85;
  }

  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    scrollbar-width: none;
    flex: 1;
  }

  .schedule-list::-webkit-scrollbar { display: none; }

  .schedule-item {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .schedule-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gradient);
    border-radius: 3px 0 0 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .schedule-item.is-current {
    background: rgba(94, 79, 245, 0.12);
    border-color: rgba(94, 79, 245, 0.3);
  }

  .schedule-item.is-current::before { opacity: 1; }

  .schedule-item.is-past { opacity: 0.4; }

  .schedule-item.is-next {
    background: rgba(61, 220, 107, 0.06);
    border-color: rgba(61, 220, 107, 0.2);
  }

  .schedule-time {
    font-family: var(--font-mono);
    font-size: clamp(10px, 1vw, 12px);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .schedule-name {
    font-size: clamp(12px, 1.2vw, 14px);
    font-weight: 500;
    color: var(--text);
  }

  .schedule-item.is-current .schedule-name { color: var(--blurple); }
  .schedule-item.is-next .schedule-name { color: var(--kermit); }

  .schedule-progress-wrap { width: 60px; }

  .schedule-progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .schedule-progress-fill {
    height: 100%;
    background: var(--gradient);
    border-radius: 99px;
    transition: width 1s linear;
  }

  .schedule-pct {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 2px;
    letter-spacing: 0.08em;
  }

  /* ── MUST-WIN ── */
  .must-win-wrap {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(61, 220, 107, 0.06);
    border: 1px solid rgba(61, 220, 107, 0.18);
    flex-shrink: 0;
  }

  .must-win-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--kermit);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .must-win-label::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--kermit);
  }

  .must-win-text {
    font-size: clamp(11px, 1vw, 13px);
    color: var(--text);
    line-height: 1.5;
    opacity: 0.85;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: clamp(12px, 2vw, 24px);
    right: clamp(12px, 2vw, 24px);
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 99px;
    padding: 8px 16px;
    cursor: pointer;
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    transition: all var(--transition);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .theme-toggle:hover {
    border-color: rgba(94, 79, 245, 0.5);
    box-shadow: 0 4px 20px var(--glow);
  }

  .toggle-dot {
    width: 20px; height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    position: relative;
    transition: background var(--transition);
  }

  .toggle-dot::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--blurple);
    transition: transform var(--transition), background var(--transition);
  }

  [data-theme="light"] .toggle-dot::after {
    transform: translateX(8px);
    background: var(--kermit);
  }

  /* ── CARD LABEL ── */
  .card-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gradient);
  }

  .card-clock   { display: flex; flex-direction: column; }
  .card-weather { display: flex; flex-direction: column; }
  .card-moon    { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .card-schedule{ display: flex; flex-direction: column; }

  .card-clock::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(94,79,245,0.08), rgba(61,220,107,0.04));
    pointer-events: none;
  }

  /* ── DAY FILTER BAR ── */
  .day-filter-wrap {
    position: relative;
    z-index: 2;
    padding: clamp(12px, 2vw, 28px) clamp(12px, 2vw, 28px) 0;
    max-width: 1800px;
    margin: 0 auto;
  }

  .day-filter {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .day-filter::-webkit-scrollbar { display: none; }

  .day-pill {
    flex-shrink: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: 99px;
    border: 1px solid var(--card-border);
    background: var(--card);
    backdrop-filter: blur(16px);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
  }

  .day-pill:hover {
    border-color: rgba(94, 79, 245, 0.4);
    box-shadow: 0 4px 16px var(--glow);
    transform: translateY(-2px);
  }

  .day-pill-name {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    transition: color 0.25s;
  }

  .day-pill-date {
    font-family: var(--font-display);
    font-size: 20px;
    line-height: 1;
    color: var(--text);
    transition: color 0.25s;
  }

  .day-pill-divider {
    width: 1px;
    height: 14px;
    background: var(--card-border);
    flex-shrink: 0;
  }

  .day-pill-tag {
    font-family: var(--font-mono);

    content: '';
    position: absolute;
    right: 10px; top: 50%; transform: translateY(-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--kermit);
  }

    background: linear-gradient(135deg, rgba(61,220,107,0.2), rgba(94,79,245,0.1));
    border-color: rgba(61, 220, 107, 0.5);
  }

  .day-pill.is-past-day { opacity: 0.5; }

  /* ── WEEK HEADER ── */
  .week-header {
    display: flex;
    align-items: center;
    gap: clamp(16px, 2vw, 28px);
  }

  .week-headline {
    font-family: var(--font-display);
    font-size: clamp(28px, 3.5vw, 52px);
    letter-spacing: 0.04em;
    color: var(--text);
    white-space: nowrap;
    line-height: 1;
    flex-shrink: 0;
  }

  .current-block-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, rgba(94,79,245,0.2), rgba(61,220,107,0.1));
    border: 1px solid rgba(94, 79, 245, 0.3);
    border-radius: 99px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--blurple);
    letter-spacing: 0.08em;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--kermit);
    animation: livePulse 1.5s ease-in-out infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .viewing-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, rgba(61,220,107,0.15), rgba(94,79,245,0.1));

    padding: 3px 10px;

    font-size: 10px;
    color: var(--kermit);

  }

  /* ── RESPONSIVE ── */
  @media (min-width: 1920px) {
    .layout { max-width: 2200px; }
    .clock-time { font-size: 160px; }
  }

  @media (max-width: 1200px) {
    .card-clock    { grid-column: span 6; }
    .card-weather  { grid-column: span 6; }
    .card-moon     { grid-column: span 4; }
    .card-schedule { grid-column: span 12; }
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: repeat(6, 1fr); }
    .card-clock    { grid-column: span 6; grid-row: span 2; }
    .card-weather  { grid-column: span 3; grid-row: span 2; }

      grid-column: 1; grid-row: auto;
    }
  }

// ── THEME ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
}

TODAY.setHours(0, 0, 0, 0);
let selectedDate = new Date(TODAY);

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

function isViewingToday() {
  return isSameDay(selectedDate, TODAY);
}

function dateKey(date) {
  return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
}

// ── CLOCK ──────────────────────────────────────────────────────────────────

const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  document.getElementById('clock-h').textContent = String(h).padStart(2, '0');
  document.getElementById('clock-m').textContent = String(m).padStart(2, '0');
  document.getElementById('clock-s').textContent = String(s).padStart(2, '0');
  document.getElementById('clock-ampm').textContent = ampm;

  if (isViewingToday()) {
    document.getElementById('clock-date').textContent =
      DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    const pct = Math.round(((now.getHours() * 60 + now.getMinutes()) / 1440) * 100);
    document.getElementById('day-pct').textContent = pct + '%';
    document.getElementById('day-fill').style.width = pct + '%';
    updateScheduleStates(now);
  } else {
    document.getElementById('clock-date').textContent =
      DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate() + ', ' + selectedDate.getFullYear();
  }
}

    { time: '12:00', label: 'Family Lunch',                                icon: '🍽️' },
    { time: '13:30', label: 'Free / Errands / Fun / Low Obligation',       icon: '🎉' },
    { time: '18:00', label: 'Gentle Reset for Next Week',                  icon: '🌙' },
  ],
};

const DAY_THEMES = {
  '2026-03-22': 'Reset, family, light planning',
  '2026-03-23': 'Early-bird growth day',
  '2026-03-24': 'Haircut day + structured follow-through',
  '2026-03-25': 'Office move + lighter brain load',
  '2026-03-26': 'Early-bird execution and ship-it day',
  '2026-03-27': 'Recovery pace + maintenance + cleanup',
  '2026-03-28': 'Sleep in, recover, optional creative wandering',
};

const MUST_WIN = {
  '2026-03-22': 'Define the landing page structure before Monday.',
  '2026-03-23': 'Move at least 3 real prospects forward. Complete landing page wireframe + headline direction.',
  '2026-03-24': 'Leave the day with the landing page visually moving, not just conceptually discussed.',
  '2026-03-25': 'Get the office move materially done. Keep landing page alive with at least one clean revision pass.',
  '2026-03-26': 'Get the financial brand landing page to final or shipped status.',
  '2026-03-27': 'End the week with clean follow-through, not psychic residue.',
  '2026-03-28': "Recover enough that Sunday doesn't turn into dread cosplay.",
};

function isRecoveryDay(date) { return date.getDay() === 5 || date.getDay() === 6 || date.getDay() === 0; }
function isWeekend(date) { return date.getDay() === 0 || date.getDay() === 6; }

function getScheduleForDate(date) {
  return SCHEDULES[dateKey(date)] || [];
}

// ── DAY FILTER ──────────────────────────────────────────────────────────────
// Fixed week: Sun Mar 22 → Sat Mar 28
const WEEK_START = new Date(2026, 2, 22); // Mar 22

function buildDayFilter() {
  const filter = document.getElementById('day-filter');
  filter.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(WEEK_START);
    d.setDate(WEEK_START.getDate() + i);

    const isToday = isSameDay(d, TODAY);
    const isPast  = d < TODAY && !isToday;
    const isRecov = isRecoveryDay(d);
    const isActive = isSameDay(d, selectedDate);

    let tag;
    if (isToday)           tag = 'Today';
    else if (d.getDay() === 5) tag = 'Recovery';
    else if (isWeekend(d)) tag = 'Rest';
    else                   tag = 'Work';

    const pill = document.createElement('button');
    pill.className = ['day-pill',
      isToday  ? 'is-today'    : '',
      isPast   ? 'is-past-day' : '',
      isRecov  ? 'is-recovery' : '',
      isActive ? 'is-active'   : '',
    ].filter(Boolean).join(' ');

    pill.innerHTML =
      '<span class="day-pill-name">' + DAYS_S[d.getDay()] + '</span>' +
      '<span class="day-pill-date">' + d.getDate() + '</span>' +
      '<div class="day-pill-divider"></div>' +
      '<span class="day-pill-tag">' + tag + '</span>';

    pill.addEventListener('click', () => selectDay(d));
    filter.appendChild(pill);
  }
}

function selectDay(date) {
  selectedDate = new Date(date);
  selectedDate.setHours(0, 0, 0, 0);

  document.querySelectorAll('.day-pill').forEach((pill, i) => {
    const d = new Date(WEEK_START);
    d.setDate(WEEK_START.getDate() + i);
    pill.classList.toggle('is-active', isSameDay(d, selectedDate));
  });

  renderMoon(selectedDate);
  buildScheduleList();
  updateScheduleHeader();

  if (!isViewingToday()) {
    document.getElementById('clock-date').textContent =
      DAYS[selectedDate.getDay()] + ', ' + MONTHS[selectedDate.getMonth()] + ' ' + selectedDate.getDate() + ', ' + selectedDate.getFullYear();
    const isPast = selectedDate < TODAY;
    document.getElementById('day-pct').textContent = isPast ? '100%' : '0%';
    document.getElementById('day-fill').style.width = isPast ? '100%' : '0%';
    updateScheduleStates(null);
  }
}

function updateScheduleHeader() {
  const badge        = document.getElementById('schedule-badge');
  const title        = document.getElementById('schedule-title');
  const themeEl      = document.getElementById('schedule-theme');
  const mustWinWrap  = document.getElementById('must-win-wrap');
  const mustWinText  = document.getElementById('must-win-text');
  const key          = dateKey(selectedDate);

  if (isViewingToday()) {
    badge.className = 'current-block-badge';
    badge.innerHTML = '<div class="live-dot"></div><span id="current-block-label">Live</span>';
    title.textContent = "TODAY'S BLOCKS";
  } else {
    badge.className = 'viewing-badge';
    badge.innerHTML = '<span id="current-block-label">' + (isRecoveryDay(selectedDate) ? '🌿 Rest' : 'Preview') + '</span>';
    title.textContent = DAYS[selectedDate.getDay()].toUpperCase() + "'S BLOCKS";
  }

  themeEl.textContent = DAY_THEMES[key] || '';

  const mw = MUST_WIN[key];
  if (mw) {
    mustWinText.textContent = mw;
    mustWinWrap.style.display = 'block';
  } else {
    mustWinWrap.style.display = 'none';
  }
}

// ── SCHEDULE LIST ───────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmt12(t) {
  let [h, m] = t.split(':').map(Number);
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ap;
}

function buildScheduleList() {
  const sched = getScheduleForDate(selectedDate);
  const list  = document.getElementById('schedule-list');
  list.innerHTML = '';
  sched.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'schedule-item';
    el.id = 'sched-' + i;
    el.innerHTML =
      '<span class="schedule-time">' + fmt12(item.time) + '</span>' +
      '<span class="schedule-name">' + item.icon + ' ' + item.label + '</span>' +
      '<div class="schedule-progress-wrap" id="spw-' + i + '" style="display:none">' +
        '<div class="schedule-progress-bar"><div class="schedule-progress-fill" id="spf-' + i + '" style="width:0%"></div></div>' +
        '<div class="schedule-pct" id="spp-' + i + '">0%</div>' +
      '</div>';
    list.appendChild(el);
  });
}

function updateScheduleStates(now) {
  const sched   = getScheduleForDate(selectedDate);
  const isToday = isViewingToday();

  if (!isToday || !now) {
    const isPastDay = selectedDate < TODAY;
    sched.forEach((_, i) => {
      const el = document.getElementById('sched-' + i);
      if (el) {
        el.className = 'schedule-item' + (isPastDay ? ' is-past' : '');
        const spw = document.getElementById('spw-' + i);
        if (spw) spw.style.display = 'none';
      }
    });
    return;
  }

  const nowMins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  let currentIdx = -1;

  for (let i = 0; i < sched.length; i++) {
    const start = timeToMins(sched[i].time);
    const end   = i < sched.length - 1 ? timeToMins(sched[i + 1].time) : 1440;
    const el    = document.getElementById('sched-' + i);
    if (!el) continue;

    el.className = 'schedule-item';
    document.getElementById('spw-' + i).style.display = 'none';

    if (nowMins >= start && nowMins < end) {
      el.classList.add('is-current');
      currentIdx = i;
      const pct = Math.min(100, Math.round(((nowMins - start) / (end - start)) * 100));
      document.getElementById('spw-' + i).style.display = 'block';
      document.getElementById('spf-' + i).style.width = pct + '%';
      document.getElementById('spp-' + i).textContent = pct + '%';
      const lbl = document.getElementById('current-block-label');
      if (lbl) lbl.textContent = sched[i].label;
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else if (nowMins < start) {
      if (i === currentIdx + 1 || (currentIdx === -1 && i === 0)) el.classList.add('is-next');
    } else {
      el.classList.add('is-past');
    }
  }
}

// ── MOON PHASE ──────────────────────────────────────────────────────────────
function getMoonPhase(date) {
  const knownNew = new Date('2000-01-06T18:14:00Z');
  const synodic  = 29.530588853;
  const diffDays = (date - knownNew) / 86400000;
  const phase    = ((diffDays % synodic) + synodic) % synodic;
  const illum    = Math.round((1 - Math.cos((phase / synodic) * 2 * Math.PI)) / 2 * 100);
  let name;
  if      (phase < 1.85)  name = 'New Moon';
  else if (phase < 7.38)  name = 'Waxing Crescent';
  else if (phase < 9.22)  name = 'First Quarter';
  else if (phase < 14.77) name = 'Waxing Gibbous';
  else if (phase < 16.61) name = 'Full Moon';
  else if (phase < 22.15) name = 'Waning Gibbous';
  else if (phase < 23.99) name = 'Last Quarter';
  else                    name = 'Waning Crescent';
  return { phase, illum, name, norm: phase / synodic };
}

function renderMoon(date) {
  date = date || new Date();
  const { illum, name, norm: p } = getMoonPhase(date);
  document.getElementById('moon-phase-name').textContent    = name;
  document.getElementById('moon-illumination').textContent  = illum + '% Illuminated';

  const R = 40, cx = 50, cy = 50;
  const termRx = Math.abs(Math.cos(p * 2 * Math.PI)) * R;

  const svg = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="90" height="90">
  <defs>
    <radialGradient id="mG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbe6"/>
      <stop offset="70%"  stop-color="#e8d98a"/>
      <stop offset="100%" stop-color="#b8a04a" stop-opacity=".8"/>
    </radialGradient>
    <radialGradient id="mD" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2a2540" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#16121f" stop-opacity=".98"/>
    </radialGradient>
    <filter id="mF"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="rH"><rect x="${cx}" y="${cy-R-5}" width="${R+5}" height="${(R+5)*2}"/></clipPath>
    <clipPath id="lH"><rect x="${cx-R-5}" y="${cy-R-5}" width="${R+5}" height="${(R+5)*2}"/></clipPath>
  </defs>
  <circle cx="${cx}" cy="${cy}" r="${R+6}" fill="${illum>5?'#e8d98a':'#5E4FF5'}" opacity=".06"/>
  <circle cx="${cx}" cy="${cy}" r="${R+3}" fill="${illum>5?'#e8d98a':'#5E4FF5'}" opacity=".10"/>
  <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#mG)" filter="url(#mF)"/>
  ${p > 0.02 && p < 0.98 ? `
  <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#mD)" clip-path="url(#${p<0.5?'lH':'rH'})"/>
  <ellipse cx="${cx}" cy="${cy}" rx="${termRx}" ry="${R}" fill="url(#mD)" clip-path="url(#${p<0.5?'rH':'lH'})"/>
  ` : p <= 0.02 ? `<circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#mD)"/>` : ''}
  <circle cx="40" cy="42" r="4"   fill="rgba(0,0,0,.06)"/>
  <circle cx="58" cy="36" r="3"   fill="rgba(0,0,0,.05)"/>
  <circle cx="52" cy="58" r="2.5" fill="rgba(0,0,0,.04)"/>
</svg>`;

  document.getElementById('moon-svg-wrap').innerHTML = svg;
}

// ── WEATHER ─────────────────────────────────────────────────────────────────
const WMO = {
  0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',
  45:'Foggy',48:'Icy Fog',
  51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
  61:'Light Rain',63:'Rain',65:'Heavy Rain',
  71:'Light Snow',73:'Snow',75:'Heavy Snow',
  80:'Showers',81:'Showers',82:'Heavy Showers',
  95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm',
};

function buildSunIcon() {
  const lines = Array.from({length:8},(_,i)=>{
    const a=i*45, r=a*Math.PI/180;
    const x1=30+Math.cos(r)*18, y1=30+Math.sin(r)*18;
    const x2=30+Math.cos(r)*26, y2=30+Math.sin(r)*26;
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffc843" stroke-width="2.5" stroke-linecap="round"/>`;
  }).join('');
  return `<div style="position:relative;width:100%;height:100%"><div class="sun-circle"></div><svg class="sun-rays" viewBox="0 0 60 60" style="position:absolute;inset:0;width:100%;height:100%">${lines}</svg></div>`;
}

function buildCloudIcon() {
  return `<div style="position:relative;width:100%;height:100%"><div class="cloud-body" style="width:70%;height:36%;bottom:22%;left:8%"></div><div class="cloud-body" style="width:50%;height:30%;bottom:38%;left:20%;animation-delay:.5s"></div><div class="cloud-body" style="width:40%;height:28%;bottom:36%;left:40%;background:rgba(200,210,220,.6);animation-delay:1s"></div></div>`;
}

function buildRainIcon() {
  const drops = Array.from({length:5},(_,i)=>`<div class="rain-drop" style="left:${15+i*14}%;height:${6+i%3*2}px;animation-delay:${(i*.18).toFixed(2)}s"></div>`).join('');
  return `<div style="position:relative;width:100%;height:100%"><div class="cloud-body" style="width:70%;height:35%;bottom:45%;left:8%"></div>${drops}</div>`;
}

function getWeatherIcon(code) {
  if (code <= 1) return buildSunIcon();
  if (code <= 3) return buildCloudIcon();
  if (code >= 51 && code <= 82) return buildRainIcon();
  return buildSunIcon();
}

async function getUserLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve({ lat:37.7749, lon:-122.4194, city:'San Francisco' });
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const lat = pos.coords.latitude.toFixed(4);
        const lon = pos.coords.longitude.toFixed(4);
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers:{'User-Agent':'DailyCommandDashboard/1.0'} });
          const d = await r.json();
          const city = d.address.city || d.address.town || d.address.village || d.address.county || 'Your Location';
          resolve({ lat, lon, city });
        } catch { resolve({ lat, lon, city:'Your Location' }); }
      },
      () => resolve({ lat:37.7749, lon:-122.4194, city:'San Francisco' }),
      { timeout:8000 }
    );
  });
}

async function fetchWeather() {
  try {
    const { lat, lon, city } = await getUserLocation();
    document.getElementById('weather-location').textContent = city;
    const tz  = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation_probability,weather_code,wind_speed_10m,is_day&daily=temperature_2m_max,temperature_2m_min,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=${encodeURIComponent(tz)}&forecast_days=3`;
    const data = await (await fetch(url)).json();
    if (data.error) throw new Error(data.reason);
    const cw = data.current;
    document.getElementById('weather-temp').innerHTML    = `<span>${Math.round(cw.temperature_2m)}</span>°`;
    document.getElementById('weather-condition').textContent = WMO[cw.weather_code] || 'Unknown';
    document.getElementById('weather-wind').textContent  = Math.round(cw.wind_speed_10m) + ' mph';
    document.getElementById('weather-humidity').textContent = (cw.relative_humidity_2m||'--') + '%';
    document.getElementById('weather-rain').textContent  = (cw.precipitation_probability||0) + '%';
    document.getElementById('weather-icon').innerHTML    = getWeatherIcon(cw.weather_code);
    const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    document.getElementById('forecast-row').innerHTML = [0,1,2].map(i => {
      const d  = new Date(data.daily.time[i] + 'T12:00:00');
      return `<div class="forecast-item"><div class="forecast-day">${dn[d.getDay()]}</div><div class="forecast-temp">${Math.round(data.daily.temperature_2m_max[i])}°</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center">${Math.round(data.daily.temperature_2m_min[i])}°</div></div>`;
    }).join('');
  } catch(e) {
    console.error('Weather:', e);
    document.getElementById('weather-condition').textContent = 'Unavailable';
    document.getElementById('weather-icon').innerHTML = buildSunIcon();
  }
}

updateClock();
setInterval(updateClock, 1000);
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);
